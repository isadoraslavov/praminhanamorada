<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Página 2</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #fff7b1, #b3d9ff);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* GRID ARRUMADO */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

/* card */
.card {
  text-align: center;
  cursor: pointer;
}

/* capa */
.cover {
  height: 200px;
  border-radius: 18px;
  background: linear-gradient(135deg, #ffd43b, #4dabf7);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* imagem */
.photo {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 18px;
  display: none;
}

.revealed .cover { display: none; }
.revealed .photo { display: block; }

.text {
  margin-top: 10px;
}

/* carta */
.next {
  text-align: center;
  margin-top: 40px;
  font-size: 40px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  50% { transform: translateY(-8px); }
}
</style>
</head>

<body>

<div class="container">

<div class="grid">

<!-- 🔥 SEUS TEXTOS PRESERVADOS -->
<div class="card" onclick="this.classList.add('revealed')">
<div class="cover"></div>
<img class="photo" src="olhos.jpg">
<div class="text">Eu me sinto vista quando você me olha.</div>
</div>

<div class="card" onclick="this.classList.add('revealed')">
<div class="cover"></div>
<img class="photo" src="cabelo.jpg">
<div class="text">Seu cabelo foi uma das primeiras coisas que eu notei em você.</div>
</div>

<div class="card" onclick="this.classList.add('revealed')">
<div class="cover"></div>
<img class="photo" src="sorriso.jpg">
<div class="text">Seu sorriso muda seu rosto inteiro.</div>
</div>

<div class="card" onclick="this.classList.add('revealed')">
<div class="cover"></div>
<img class="photo" src="coisas.png">
<div class="text">Tem coisas que você gosta que acabaram ficando comigo também.</div>
</div>

</div>

<div class="next">
  ↓ ✉️ <a href="pagina3.html"></a>
</div>

</div>

</body>
</html>
