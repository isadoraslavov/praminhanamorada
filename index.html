<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Isa</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #fff7b1, #b3d9ff);
  color: #1a1a1a;
  overflow-x: hidden;
}

/* topo */
.header {
  padding: 20px;
  text-align: center;
  font-weight: bold;
  letter-spacing: 2px;
}

/* abelhas */
.bee {
  position: absolute;
  animation: fly 12s linear infinite;
}

@keyframes fly {
  0% { transform: translateX(-10vw) translateY(0); }
  50% { transform: translateX(50vw) translateY(-30px); }
  100% { transform: translateX(110vw) translateY(0); }
}

/* container texto */
.container {
  max-width: 700px;
  margin: auto;
  padding: 40px 20px;
}

/* botão/ícone música */
.music {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}

/* botão próximo */
.next {
  margin-top: 40px;
  text-align: center;
}

.next a {
  text-decoration: none;
  font-size: 18px;
  color: black;
  border-bottom: 1px solid black;
}

/* contador */
.counter {
  margin-top: 30px;
  font-size: 18px;
  text-align: center;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- música -->
<div class="music" onclick="toggleMusic()">🐝</div>

<audio id="song" loop>
  <source src="sua-musica.mp3" type="audio/mp3">
</audio>

<!-- abelhas decorativas -->
<div class="bee" style="top:10%; left:0;">🐝</div>
<div class="bee" style="top:30%; left:-20%;">🐝</div>
<div class="bee" style="top:60%; left:-40%;">🐝</div>

<!-- topo -->
<div class="header">
  para ysa
</div>

<!-- texto principal -->
<div class="container">

<p>
Eu tava pensando…<br>
tem coisas em você que eu acabo reparando sem nem perceber<br>
e isso sempre acaba virando parte do que eu mais gosto em você
</p>

<!-- contador -->
<div class="counter">
  juntos há:<br>
  <span id="time"></span>
  <div class="small">desde 24 de janeiro</div>
</div>

<!-- botão página 2 -->
<div class="next">
  <a href="pagina2.html">mas não sei escolher uma só…</a>
</div>

</div>

<script>
// música
function toggleMusic() {
  const audio = document.getElementById("song");
  if (audio.paused) audio.play();
  else audio.pause();
}

// contador
function updateCounter() {
  const start = new Date("2024-01-24T00:00:00");
  const now = new Date();

  let diff = now - start;

  let days = Math.floor(diff / (1000 * 60 * 60 * 24));
  let hours = Math.floor(diff / (1000 * 60 * 60));
  let minutes = Math.floor(diff / (1000 * 60));

  document.getElementById("time").innerText =
    days + " dias • " + hours + " horas • " + minutes + " minutos";
}

setInterval(updateCounter, 1000);
updateCounter();
</script>

</body>
</html>
