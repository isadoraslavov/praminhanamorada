<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Ysa 💙</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #f9d423);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* título */
h1 {
    margin-top: 50px;
    font-size: 40px;
}

/* caixas */
.container {
    padding: 20px;
}

.box {
    background: rgba(0,0,0,0.35);
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    border-radius: 20px;
    backdrop-filter: blur(6px);
}

/* botão */
button {
    padding: 15px 25px;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    cursor: pointer;
    background: #ffd700;
    color: black;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* 🐝 ABELHAS */
.bee {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    animation: floatBee linear forwards;
}

/* movimento real */
@keyframes floatBee {
    0% {
        transform: translate(0, 0) rotate(0deg);
    }
    25% {
        transform: translate(30vw, 10vh) rotate(20deg);
    }
    50% {
        transform: translate(60vw, -10vh) rotate(-20deg);
    }
    75% {
        transform: translate(90vw, 20vh) rotate(10deg);
    }
    100% {
        transform: translate(120vw, 0vh) rotate(0deg);
    }
}
</style>
</head>

<body>

<h1>💙 Para Ysa 💛</h1>

<div class="container">

    <div class="box">
        <h2>⏳ Nosso tempo juntos</h2>
        <p id="contador"></p>
    </div>

    <div class="box">
        <h2>🎵 Nossa música</h2>
        <audio controls>
            <source src="musica.mp3" type="audio/mp3">
        </audio>
    </div>

    <div class="box">
        <h2>💌 Carta pra você</h2>
        <button onclick="window.location.href='carta.html'">
            Abrir carta
        </button>
    </div>

</div>

<script>
// ⏳ contador desde 24/01/2026
const inicio = new Date("2026-01-24");
const hoje = new Date();

const diff = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));

document.getElementById("contador").innerHTML =
"Estamos juntos há <b>" + diff + "</b> dias 💙💛";
</script>

<script>
// 🐝 criar abelhas voando
function createBee() {
    const bee = document.createElement("div");
    bee.classList.add("bee");
    bee.innerHTML = "🐝";

    bee.style.top = Math.random() * window.innerHeight + "px";
    bee.style.left = "-50px";

    let duration = 6 + Math.random() * 6;
    bee.style.animationDuration = duration + "s";

    document.body.appendChild(bee);

    setTimeout(() => {
        bee.remove();
    }, duration * 1000);
}

setInterval(createBee, 700);
</script>

</body>
</html>
