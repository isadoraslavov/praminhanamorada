<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Isa</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #fff7b1, #b3d9ff);
  overflow-x: hidden;
  color: #1a1a1a;
}

/* topo */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

/* contador */
.counter {
  background: rgba(255,255,255,0.85);
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* música */
.music {
  font-size: 30px;
  cursor: pointer;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.1); }
}

/* conteúdo */
.container {
  max-width: 700px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* título */
.header {
  font-weight: bold;
  letter-spacing: 2px;
  text-align: center;
  margin-top: 10px;
}

/* texto original preservado */
.texto {
  margin-top: 40px;
  line-height: 1.7;
  font-size: 16px;
}

/* botão */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 26px;
  background: #4dabf7;
  color: white;
  border-radius: 30px;
  text-decoration: none;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="top">
  <div class="counter" id="contador"></div>
  <div class="music" onclick="toggleMusic()">🐝</div>
</div>

<div class="header">Paraíso 💛💙</div>

<div class="container">

<!-- 🔥 SEU TEXTO ORIGINAL PRESERVADO -->
<div class="texto">
<p>Eu tava pensando…<br>
tem coisas em você que eu acabo reparando sem nem perceber<br>
e sempre acaba virarando parte das coisas que eu mais gosto em você</p>
</div>

<a class="btn" href="pagina2.html">mas como não sei escolher uma só…</a>

</div>

<audio id="musica" src="musica.mp3"></audio>

<script>
function toggleMusic() {
  const m = document.getElementById("musica");
  m.paused ? m.play() : m.pause();
}

function atualizar() {
  const inicio = new Date("2024-01-24T00:00:00");
  const agora = new Date();

  let diff = Math.floor((agora - inicio)/1000);

  let meses = Math.floor(diff/(30*24*3600));
  diff %= (30*24*3600);

  let dias = Math.floor(diff/(24*3600));
  diff %= (24*3600);

  let horas = Math.floor(diff/3600);
  diff %= 3600;

  let min = Math.floor(diff/60);
  let seg = diff%60;

  document.getElementById("contador").innerHTML =
    `${meses}m • ${dias}d • ${horas}h • ${min}m • ${seg}s`;
}

setInterval(atualizar,1000);
atualizar();
</script>

</body>
</html>
