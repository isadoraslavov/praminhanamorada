<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Nosso Começo</title>
    <link rel="stylesheet" href="style.css">

<body class="bg-gradient">

            <div class="lado-direito">

                <p class="frase-subtitulo">

                </p>

                <div class="grid-fotos">
                    <div class="foto-polaroid"><img src="foto1.jpg" class="img-placeholder"></div>
                    <div class="foto-polaroid"><img src="foto2.jpg" class="img-placeholder"></div>
                    <div class="foto-polaroid"><img src="foto3.jpg" class="img-placeholder"></div>
                    <div class="foto-polaroid"><img src="foto4.jpg" class="img-placeholder"></div>
                </div>

                <a href="pagina2.html" class="botao-amarelo">
                    mas como eu não consigo escolher uma só...

    <script src="script.js"></script>
